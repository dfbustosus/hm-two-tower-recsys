name: Gitleaks Secret Scan

on:
  pull_request:
    types:
      - opened
      - synchronize
      - reopened

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Gitleaks
        run: |
          GITLEAKS_BASE="https://github.com/gitleaks/gitleaks/releases/download"
          GITLEAKS_VERSION="v8.18.4"
          GITLEAKS_ARCHIVE="gitleaks_8.18.4_linux_x64.tar.gz"
          GITLEAKS_URL="${GITLEAKS_BASE}/${GITLEAKS_VERSION}/${GITLEAKS_ARCHIVE}"
          wget -qO- "$GITLEAKS_URL" | tar xz
          sudo mv gitleaks /usr/local/bin/

      - name: Generate Gitleaks Config
        run: |
          cat > /tmp/.gitleaks.toml << 'TOML'
          title = "Gitleaks EDM Config"

          [extend]
          useDefault = true

          [allowlist]
          description = "Global allowlist for documentation and example patterns"
          paths = [
            '''^README\.md$''',
            '''^.*README.*\.md$''',
            '''^docs/.*''',
            '''^\.github/.*\.md$''',
            '''^CHANGELOG\.md$''',
            '''^CONTRIBUTING\.md$''',
            '''^LICENSE.*''',
            '''^.*\.example$''',
            '''^.*\.sample$''',
            '''^.*\.template$''',
            '''^.*\.tmpl$''',
            '''^tests?/.*''',
            '''^__tests__/.*''',
            '''^.*\.test\.(js|ts|py|ps1)$''',
            '''^.*\.spec\.(js|ts)$''',
            '''^\.gitignore$''',
            '''^\.gitattributes$''',
          ]
          regexes = [
            '''(?i)(example|placeholder|your[_-]?secret|changeme|replace[_-]?me|insert[_-]?here)''',
            '''(?i)(dummy|fake|test|sample|<.*?>|\$\{.*?\}|%.*?%)''',
            '''AKIAIOSFODNN7EXAMPLE''',
            '''wJalrXUtnFEMI/K7MDENG/bPxRfiCYEXAMPLEKEY''',
            '''cafebabe''',
            '''deadbeef''',
            '''00000000''',
            '''"(secret|password|token|key|credential)_?(here|value|example|placeholder|goes_here)"''',
          ]

          [[rules]]
          id = "ignore-yaml-sql-comments"
          description = "Ignore secret-like patterns inside YAML/SQL comment lines"
          regex = '''^\s*#.*(?i)(secret|password|token|key).*[:=].*'''

          [rules.allowlist]
          regexes = ['.*']
          TOML
          echo "Gitleaks config generated at /tmp/.gitleaks.toml"

      - name: Run Gitleaks Scan
        id: gitleaks
        run: |
          echo "Running Gitleaks scan on PR commits..."
          echo "Base SHA: ${{ github.event.pull_request.base.sha }}"
          echo "Head SHA: ${{ github.event.pull_request.head.sha }}"

          gitleaks detect \
            --source . \
            --log-opts "${{ github.event.pull_request.base.sha }}..${{ github.event.pull_request.head.sha }}" \
            --config /tmp/.gitleaks.toml \
            --report-format json \
            --report-path gitleaks-report.json \
            --verbose \
            --exit-code 1

      - name: Upload Gitleaks Report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gitleaks-report
          path: gitleaks-report.json

      - name: Summary - Success
        if: success()
        run: |
          echo "## ✅ Gitleaks Scan Passed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "No secrets or sensitive information were detected in this pull request." >> "$GITHUB_STEP_SUMMARY"

      - name: Summary - Failed
        if: failure()
        run: |
          echo "## 🚨 Gitleaks Scan Failed" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Secrets or sensitive information were detected in this pull request." >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"

          if [ -f gitleaks-report.json ]; then
            echo "### Findings:" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "| # | Rule | File | Line |" >> "$GITHUB_STEP_SUMMARY"
            echo "|---|------|------|------|" >> "$GITHUB_STEP_SUMMARY"
            jq -r '
              to_entries
              | .[:10][]
              | "| \(.key + 1) | `\(.value.RuleID)` | `\(.value.File)` | \(.value.StartLine) |"
            ' gitleaks-report.json >> "$GITHUB_STEP_SUMMARY"

            TOTAL=$(jq length gitleaks-report.json)
            if [ "$TOTAL" -gt 10 ]; then
              REMAINING=$((TOTAL - 10))
              echo "" >> "$GITHUB_STEP_SUMMARY"
              echo "*... and $REMAINING more findings.*" >> "$GITHUB_STEP_SUMMARY"
              echo "Download the artifact for the full report." >> "$GITHUB_STEP_SUMMARY"
            fi
          fi

      - name: Comment on clean PR
        if: success()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const successBody = [
              '✅ **Gitleaks Scan Passed**',
              '',
              'No secrets or sensitive information were detected in this pull request.'
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: successBody
            });

      - name: Comment on failed PR
        if: failure()
        uses: actions/github-script@v7
        continue-on-error: true
        with:
          script: |
            const fs = require('fs');
            let reportSummary = '';

            try {
              const report = JSON.parse(fs.readFileSync('gitleaks-report.json', 'utf8'));
              reportSummary = `\n\n**Findings:** ${report.length} secret(s) detected\n\n`;

              report.slice(0, 5).forEach((finding, index) => {
                reportSummary += `${index + 1}. \`${finding.RuleID}\` in \`${finding.File}\` `;
                reportSummary += `(line ${finding.StartLine})\n`;
              });

              if (report.length > 5) {
                reportSummary += `\n... and ${report.length - 5} more. See full report in artifacts.`;
              }
            } catch (error) {
              reportSummary = '\n\nCould not parse report. Check the artifacts for details.';
            }

            const runUrl = [
              'https://github.com',
              '${{ github.repository }}',
              'actions',
              'runs',
              '${{ github.run_id }}'
            ].join('/');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: [
                '🚨 **Gitleaks Scan Failed**',
                '',
                'Secrets or sensitive information were detected in this pull request.',
                reportSummary,
                '',
                `[View full report](${runUrl})`
              ].join('\n')
            });
