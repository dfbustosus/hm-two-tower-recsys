name: Security

on:
  push:
    branches:
      - main
  pull_request:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  secret-scan:
    name: Gitleaks secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository history
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-security:
    name: Python dependency and static security checks
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.txt

      - name: Install security tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements-dev.txt

      - name: Audit Python development dependencies
        run: pip-audit -r requirements-dev.txt --progress-spinner off

      - name: Detect Python files
        id: python_files
        run: |
          python - <<'PY'
          import os
          from pathlib import Path

          ignored_parts = {
              ".git",
              ".venv",
              "artifacts",
              "data",
              "env",
              "models",
              "node_modules",
              "outputs",
              "submissions",
              "venv",
          }
          files = sorted(
              str(path)
              for path in Path(".").rglob("*.py")
              if not any(part in ignored_parts for part in path.parts)
          )
          with open(os.environ["GITHUB_OUTPUT"], "a", encoding="utf-8") as output:
              output.write(f"has_python={'true' if files else 'false'}\n")
          print(f"Detected {len(files)} Python file(s).")
          PY

      - name: Bandit static security scan
        if: steps.python_files.outputs.has_python == 'true'
        run: |
          bandit -r . \
            --exclude .git,.venv,artifacts,data,env,models,outputs,submissions,venv \
            -ll
